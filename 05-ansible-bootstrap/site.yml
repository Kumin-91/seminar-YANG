---
- name: "Step 1. Infrastructure Baseline & Mesh Networking"
  hosts: all
  become: yes
  gather_facts: yes
  any_errors_fatal: true 
  roles:
    # 공통 설정과 필수 도구 설치
    - role: common
      tags: ["common", "setup"]
    # Tailscale 설치 및 네트워크 설정
    - role: tailscale
      tags: ["network", "tailscale"]

- name: "Step 2. Shared Storage Configuration"
  hosts: storage_nodes
  become: yes
  gather_facts: no
  # storage_nodes 그룹에 대한 스토리지 설정 역할 할당
  roles:
    - role: juicefs
      tags: ["storage", "juicefs"]

- name: "Step 3. K3s Cluster Bootstrapping - Control Plane"
  hosts: control_plane
  become: yes
  # K3s 컨트롤 플레인 노드에 대한 부트스트래핑 역할 할당
  roles:
    - role: k3s-controller
      tags: ["k3s", "controller"]

- name: "Step 4. K3s Cluster Bootstrapping - Worker Node"
  hosts: worker
  become: yes
  # K3s 워커 노드에 대한 부트스트래핑 역할 할당
  roles:
    - role: k3s-worker
      tags: ["k3s", "worker"]