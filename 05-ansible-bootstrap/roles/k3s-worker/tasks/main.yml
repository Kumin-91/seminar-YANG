- name: "1. K3s Worker 설치 및 클러스터 합류"
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL="https://{{ hostvars[groups['k8s_init'][0]]['ts_ip'] }}:6443" \
    K3S_TOKEN="{{ hostvars[groups['k8s_init'][0]]['k3s_token_raw']['content'] | b64decode | trim }}" \
    sh -s - agent \
    --node-ip={{ ts_ip }} \
    --node-external-ip={{ ts_ip }} \
    --flannel-iface=tailscale0 \
    {% for label in k8s_node_labels | default([]) %}--node-label "{{ label }}" {% endfor %}
  args:
    creates: /etc/systemd/system/k3s-agent.service

- name: "2. K3s 에이전트 서비스 활성화 및 시작"
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: yes