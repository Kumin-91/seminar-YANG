- name: "0. K3s Cluster Token 저장"
  ansible.builtin.set_fact:
    seed_node_ip: "{{ hostvars[groups['k8s_init'][0]]['ts_ip'] }}"
    cluster_token: "{{ hostvars[groups['k8s_init'][0]]['k3s_token_raw']['content'] | b64decode | trim }}"
  run_once: true

- name: "1. K3s Worker 설치 및 클러스터 합류"
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL=https://{{ seed_node_ip }}:6443 \
    K3S_TOKEN={{ cluster_token }} \
    sh -s - agent \
    --node-ip={{ ts_ip }} \
    --node-external-ip={{ ts_ip }} \
    --flannel-iface=tailscale0
  args:
    creates: /etc/rancher/k3s/k3s.yaml
  become: yes

- name: "2. K3s 에이전트 서비스 활성화 및 시작"
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: yes
  become: yes