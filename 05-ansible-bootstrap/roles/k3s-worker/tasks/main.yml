- name: "1-1. K3s 설정 디렉토리 준비 (Worker 노드)"
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: "1-2. K3s Worker Node 설정 파일 배포"
  ansible.builtin.template:
    src: k3s-worker.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: '0600'
  register: k3s_worker_template

- name: "1-3. Cluster Worker Node 설치"
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | sh -s - agent
  args:
    creates: /etc/systemd/system/k3s-agent.service

- name: "1-4. 설정 변경 시 K3s Agent 서비스 재시작"
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
    daemon_reload: yes
  when: k3s_worker_template.changed