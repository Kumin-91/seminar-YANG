- name: "1. JuiceFS 설치"
  block:
    - name: "설치 스크립트 실행"
      ansible.builtin.shell: |
        curl -sSL https://d.juicefs.com/install | sh -s /usr/local/bin
      args:
        creates: "/usr/local/bin/juicefs"

    - name: "설치 확인"
      ansible.builtin.command: "/usr/local/bin/juicefs --version"
      register: juicefs_version
      changed_when: false

    - name: "마운트 디렉토리 생성"
      ansible.builtin.file:
        path: "{{ storage_info.mount_point }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0770'

- name: "2. JuiceFS 파일 시스템 포맷"
  ansible.builtin.command: >
    /usr/local/bin/juicefs format
    --storage s3
    --bucket "{{ storage_info.s3_url }}/jfs"
    --access-key "{{ minio_root_user }}"
    --secret-key "{{ minio_root_password }}"
    "redis://:{{ redis_password }}@{{ storage_info.redis_url }}/0"
    "{{ jfs_name | default('hybrid-cloud-jfs') }}"
  register: format_result
  failed_when: "format_result.rc != 0 and 'already exists' not in format_result.stderr"

- name: "3. FUSE: 타 사용자 접근 허용 설정"
  ansible.builtin.lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?user_allow_other'
    line: 'user_allow_other'

- name: "4. JuiceFS 마운트 서비스 배포 및 활성화"
  block:
    - name: "Jinja2 서비스 템플릿 배포"
      ansible.builtin.template:
        src: juicefs-mount.service.j2
        dest: /etc/systemd/system/juicefs-mount.service
        mode: '0644'
      register: jfs_service_template

    - name: "JuiceFS 서비스 설정 재시작"
      ansible.builtin.systemd:
        name: juicefs-mount
        state: restarted
        daemon_reload: yes
      when: jfs_service_template.changed

    - name: "JuiceFS 마운트 서비스 시작"
      ansible.builtin.systemd:
        name: juicefs-mount
        state: started
        enabled: yes
        daemon_reload: yes

- name: "5. JuiceFS 상태 및 연결 확인"
  ansible.builtin.command: "df -h {{ storage_info.mount_point }}"
  register: mount_status
  changed_when: false
  until: mount_status.rc == 0
  retries: 5
  delay: 5

- name: "6. JuiceFS 마운트 후 소유권 강제 재적용"
  ansible.builtin.file:
    path: "{{ storage_info.mount_point }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0770'