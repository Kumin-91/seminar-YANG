- name: "1. JuiceFS 설치"
  block:
    - name: "설치 스크립트 실행"
      ansible.builtin.shell: |
        curl -sSL https://d.juicefs.com/install | sh -s {{ juicefs_bin_path | dirname }}
      args:
        creates: "{{ juicefs_bin_path }}"
      become: yes

    - name: "설치 확인"
      ansible.builtin.command: "{{ juicefs_bin_path }} --version"
      register: juicefs_version
      changed_when: false
      become: yes

    - name: "마운트 디렉토리 생성"
      ansible.builtin.file:
        path: "{{ storage_info.mount_point }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0770'
      become: yes

- name: "2. JuiceFS 파일 시스템 포맷"
  ansible.builtin.command: >
    {{ juicefs_bin_path }} format
    --storage s3
    --bucket "{{ storage_info.s3_url }}/jfs"
    --access-key "{{ minio_root_user }}"
    --secret-key "{{ minio_root_password }}"
    "redis://:{{ redis_password }}@{{ storage_info.redis_url }}/0"
    "{{ jfs_name | default('hybrid-cloud-jfs') }}"
  register: format_result
  # 이미 존재한다는 에러 (rc=1)는 무시하여 멱등성을 유지합니다.
  failed_when: "format_result.rc != 0 and 'already exists' not in format_result.stderr"
  become: yes

- name: "3. FUSE: 타 사용자 접근 허용 설정"
  ansible.builtin.lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?user_allow_other'
    line: 'user_allow_other'
  become: yes

- name: "4. JuiceFS 마운트 서비스 설정 및 시작"
  block:
    - name: "Jinja2 서비스 템플릿 배포"
      ansible.builtin.template:
        src: juicefs-mount.service.j2
        dest: /etc/systemd/system/juicefs-mount.service
        mode: '0644'
      become: yes

    - name: "JuiceFS 마운트 서비스 시작 및 활성화"
      ansible.builtin.systemd:
        name: juicefs-mount
        state: started
        enabled: yes
        daemon_reload: yes
      become: yes

- name: "5. JuiceFS 상태 및 연결 확인"
  ansible.builtin.command: "df -h {{ storage_info.mount_point }}"
  register: mount_status
  until: mount_status.rc == 0
  retries: 5
  delay: 5

- name: "6. JuiceFS 마운트 후 소유권 강제 재적용"
  ansible.builtin.file:
    path: "{{ storage_info.mount_point }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0770'
  become: yes

- name: "7. 연결 성공 메시지 출력"
  ansible.builtin.debug:
    msg: 
      - "🚀 JuiceFS Mount Success on {{ inventory_hostname }}!"
      - "📍 Mount Point: {{ storage_info.mount_point }}"
      - "📊 Cache Config: {{ storage_info.cache_size }}GB"
      - "🔗 Backend: {{ storage_info.s3_url }}"