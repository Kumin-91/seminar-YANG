- name: "1. JuiceFS 패키지 관리 및 마운트 준비"
  block:
    - name: "최신 JuiceFS 설치 및 업데이트"
      ansible.builtin.shell: |
        curl -sSL https://d.juicefs.com/install | sh -s /usr/local/bin
      args:
        creates: /usr/local/bin/juicefs
      retries: 5
      delay: 10

    - name: "마운트 디렉토리 생성"
      ansible.builtin.file:
        path: "{{ storage_info.mount_point }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0770'

- name: "2. JuiceFS 파일 시스템 포맷"
  ansible.builtin.command: >
    /usr/local/bin/juicefs format
      --storage s3
      --bucket "{{ storage_info.s3_url | trim }}/jfs"
      --access-key "{{ minio_root_user }}"
      --secret-key "{{ minio_root_password }}"
      "redis://:{{ redis_password }}@{{ storage_info.redis_url | trim }}/0"
      {{ jfs_name | default('hybrid-cloud-jfs') }}
  register: format_result
  run_once: true
  changed_when: "'successfully' in format_result.stdout"
  failed_when: 
    - format_result.rc != 0
    - "'already exists' not in format_result.stderr"
  no_log: true

- name: "3. FUSE: 타 사용자 접근 허용 설정"
  ansible.builtin.lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?user_allow_other'
    line: 'user_allow_other'
  register: fuse_config

- name: "4. JuiceFS 마운트 서비스 배포 및 활성화"
  block:
    - name: "마운트 서비스 템플릿 배포"
      ansible.builtin.template:
        src: juicefs-mount.service.j2
        dest: /etc/systemd/system/juicefs-mount.service
        mode: '0644'
      register: jfs_service_template

    - name: "서비스 설정 즉시 반영"
      ansible.builtin.systemd:
        name: juicefs-mount
        state: "{{ 'restarted' if jfs_service_template.changed or fuse_config.changed else 'started' }}"
        enabled: yes
        daemon_reload: yes

- name: "5. JuiceFS 상태 및 연결 확인"
  ansible.builtin.command: "timeout 5 df -h {{ storage_info.mount_point }}"
  register: mount_status
  changed_when: false
  until: mount_status.rc == 0
  retries: 5
  delay: 5

- name: "6. JuiceFS 마운트 후 소유권 강제 재적용"
  ansible.builtin.file:
    path: "{{ storage_info.mount_point }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0770'