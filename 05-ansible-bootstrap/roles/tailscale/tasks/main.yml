- name: "1. Tailscale 패키지 설치"
  block:
    - name: "공식 설치 스크립트 실행"
      ansible.builtin.shell: |
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/sbin/tailscaled

    - name: "서비스 활성화 및 부팅 시 자동 시작"
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: yes

- name: "2. Tailnet 조인 여부 확인"
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  failed_when: false
  changed_when: false

- name: "3. Tailnet 인증 및 연결 설정"
  ansible.builtin.command: >
    tailscale up 
    --authkey={{ tailscale_auth_key }} 
    --hostname={{ inventory_hostname }} 
    --accept-routes=false 
    --accept-dns=false 
    --reset
  when: (tailscale_status.stdout | from_json).BackendState != "Running"
  no_log: true

- name: "4. Tailscale IP 할당 및 변수 주입"
  block:
    - name: "IPv4 주소 확인"
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      until: tailscale_ip.rc == 0
      retries: 5
      delay: 2

    - name: "Fact 변수 (ts_ip) 등록"
      ansible.builtin.set_fact:
        ts_ip: "{{ tailscale_ip.stdout }}"
  when: ts_ip is not defined

- name: "5. NIC Offload 기능 조정 및 영구 적용 (GRO/RX)"
  block:
    - name: "즉시 적용 (Runtime)"
      ansible.builtin.command: /sbin/ethtool -K {{ ansible_facts['default_ipv4']['interface'] }} rx-udp-gro-forwarding on rx-gro-list off
      ignore_errors: true
      register: ethtool_result
      changed_when: false

    - name: "재부팅 유지를 위한 Systemd Oneshot 서비스 생성"
      ansible.builtin.copy:
        dest: /etc/systemd/system/nic-offload-tuning.service
        mode: '0644'
        content: |
          [Unit]
          Description=NIC Offload Tuning (UDP GRO) for Tailscale Backbone
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=-/sbin/ethtool -K {{ ansible_facts['default_ipv4']['interface'] }} rx-udp-gro-forwarding on rx-gro-list off
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    - name: "NIC 튜닝 서비스 활성화"
      ansible.builtin.systemd:
        name: nic-offload-tuning
        enabled: yes
        daemon_reload: yes

- name: "6. 커널 파라미터 튜닝 (BBR & UDP Buffer)"
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    # 1. BBR 활성화
    - { key: 'net.core.default_qdisc', value: 'fq' }
    - { key: 'net.ipv4.tcp_congestion_control', value: 'bbr' }
    # 2. UDP Receive/Send Buffer 최대치 증가 (WireGuard 최적화, 25MB)
    - { key: 'net.core.rmem_max', value: '26214400' }
    - { key: 'net.core.wmem_max', value: '26214400' }
    - { key: 'net.core.rmem_default', value: '8388608' }
    - { key: 'net.core.wmem_default', value: '8388608' }
    - { key: 'net.core.netdev_max_backlog', value: '5000' }
    # 3. IP 포워딩 (서브넷 라우팅 대비)
    - { key: 'net.ipv4.ip_forward', value: '1' }

- name: "7. Tailscale 데몬 리소스 우선순위 할당"
  block:
    - name: "Systemd Override 디렉토리 생성"
      ansible.builtin.file:
        path: /etc/systemd/system/tailscaled.service.d
        state: directory

    - name: "우선순위 튜닝 파일 주입"
      ansible.builtin.copy:
        dest: /etc/systemd/system/tailscaled.service.d/priority.conf
        content: |
          [Service]
          OOMScoreAdjust=-500
          Nice=-5
      register: tailscale_override

    - name: "Tailscaled 데몬 재시작"
      ansible.builtin.systemd:
        name: tailscaled
        state: restarted
        daemon_reload: yes
      when: tailscale_override.changed