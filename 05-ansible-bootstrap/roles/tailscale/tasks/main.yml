- name: "1. Tailscale 패키지 설치 및 업데이트"
  ansible.builtin.shell: |
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/sbin/tailscaled
  retries: 5
  delay: 10

- name: "2. Tailscale 데몬 실행 확인"
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: yes

- name: "3. Tailnet 조인 여부 확인"
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  failed_when: false
  changed_when: false

- name: "4. Tailnet 인증 및 연결 설정"
  ansible.builtin.command: >
    tailscale up 
      --auth-key={{ tailscale_auth_key }} 
      --hostname={{ inventory_hostname }} 
      --accept-routes=false 
      --accept-dns=false 
      --reset
  register: tailscale_up_result
  no_log: true
  when: >
    tailscale_status.rc != 0 or 
    (tailscale_status.stdout | from_json).BackendState != 'Running'

- name: "5. Tailscale IP 할당 및 변수 주입"
  block:
    - name: "5-1. IPv4 주소 확인"
      ansible.builtin.command: tailscale ip -4
      register: tailscale_ip
      changed_when: false
      until: tailscale_ip.rc == 0
      retries: 5
      delay: 2

    - name: "5-2. Fact 변수 (ts_ip) 등록"
      ansible.builtin.set_fact:
        ts_ip: "{{ tailscale_ip.stdout | trim }}"
        cacheable: yes
  when: ts_ip is not defined

- name: "6. NIC Offload 및 커널 튜닝"
  block:
    - name: "6-1. NIC 튜닝 서비스 생성"
      ansible.builtin.copy:
        dest: /etc/systemd/system/nic-offload-tuning.service
        mode: '0644'
        content: |
          [Unit]
          Description=NIC Offload Tuning for Tailscale
          After=network-online.target
          [Service]
          Type=oneshot
          ExecStart=-/sbin/ethtool -K {{ ansible_facts['default_ipv4']['interface'] | default('eth0') }} rx-udp-gro-forwarding on rx-gro-list off
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target
      register: nic_tuning

    - name: "6-2. 튜닝 즉시 반영"
      ansible.builtin.systemd:
        name: nic-offload-tuning
        state: restarted
        enabled: yes
        daemon_reload: yes
      when: nic_tuning.changed

    - name: "6-3. BBR 커널 모듈 적재 확인"
      community.general.modprobe:
        name: tcp_bbr
        state: present

    - name: "6-4. 커널 파라미터 튜닝 (BBR & UDP)"
      ansible.builtin.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        # 1. BBR 활성화
        - { key: 'net.core.default_qdisc', value: 'fq' }
        - { key: 'net.ipv4.tcp_congestion_control', value: 'bbr' }
        # 2. UDP 성능 최적화
        - { key: 'net.core.rmem_max', value: '26214400' }
        - { key: 'net.core.wmem_max', value: '26214400' }
        - { key: 'net.core.rmem_default', value: '8388608' }
        - { key: 'net.core.wmem_default', value: '8388608' }
        - { key: 'net.core.netdev_max_backlog', value: '5000' }
        # 3. IP 포워딩
        - { key: 'net.ipv4.ip_forward', value: '1' }

- name: "7. Tailscale 데몬 리소스 우선순위 할당"
  block:
    - name: "7-1. Systemd Override 디렉토리 생성"
      ansible.builtin.file:
        path: /etc/systemd/system/tailscaled.service.d
        state: directory
        mode: '0755'
        
    - name: "7-2. Systemd Override 설정"
      ansible.builtin.copy:
        dest: /etc/systemd/system/tailscaled.service.d/priority.conf
        content: |
          [Service]
          OOMScoreAdjust=-500
          Nice=-5
      register: ts_priority

    - name: "7-3. Tailscale 데몬 즉시 재시작"
      ansible.builtin.systemd:
        name: tailscaled
        state: restarted
        daemon_reload: yes
      when: ts_priority.changed