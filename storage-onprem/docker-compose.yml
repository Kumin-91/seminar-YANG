services:
  # Redis - Medatata Engine
  redis:
    image: redis:latest
    container_name: jfs-redis
    restart: unless-stopped
    ports:
      - 4279:6379
    volumes:
      - /docker/jfs-redis/data:/data
    labels:
      - "d2n.enabled=true"
      - "d2n.database=Docker"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
  # MinIO - Object Storage
  minio:
    image: minio/minio:latest
    container_name: jfs-minio
    restart: unless-stopped
    ports:
      - 4200:9000
      - 4201:9001
    volumes:
      - /zfs/storage/jfs-minio:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    labels:
      - "d2n.enabled=true"
      - "d2n.database=Docker"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5